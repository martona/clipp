name: Release pipeline (reusable)

# Build + sign + package + attest + publish. Invoked from release-manual.yml
# and release-tag.yml; not directly triggerable. Callers compute version/tag/
# draft and pass them in.

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'W.X.Y.Z (no v prefix)'
      tag:
        required: true
        type: string
        description: 'Full tag name including v prefix (e.g. v1.2.3.4)'
      draft:
        required: true
        type: boolean
        description: 'Create the GitHub release as a draft (not published)'

permissions:
  contents: write       # create release + upload assets
  id-token: write       # sigstore OIDC for attestation + Azure OIDC for signing
  attestations: write   # write build provenance attestation

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # environment: scope the OIDC token's `subject` claim to
    # repo:martona/clipp:environment:release-signing. The Azure-side federated
    # credential matches on that claim, so both manual and tag triggers
    # authenticate through the same federated identity.
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
            triplet: x64-windows-static
            vcvars_arch: amd64
          - arch: arm64
            runner: windows-11-arm
            triplet: arm64-windows-static
            vcvars_arch: arm64
    defaults:
      run:
        shell: pwsh
    env:
      CLIPP_RELEASE_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
    steps:
      - name: Checkout clipp
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read vcpkg baseline
        id: vcpkg-baseline
        run: |
          $manifest = Get-Content -Raw src\vcpkg.json | ConvertFrom-Json
          $baseline = $manifest.'builtin-baseline'
          if (-not $baseline) {
            throw "src\vcpkg.json must define builtin-baseline for CI."
          }
          "ref=$baseline" >> $env:GITHUB_OUTPUT

      - name: Set vcpkg short root
        run: |
          $workspaceRoot = [System.IO.Path]::GetPathRoot($env:GITHUB_WORKSPACE)
          if (-not $workspaceRoot) {
            throw "Could not determine workspace drive from GITHUB_WORKSPACE='$env:GITHUB_WORKSPACE'."
          }
          $vcpkgRoot = Join-Path $workspaceRoot "v"
          if (Test-Path $vcpkgRoot) {
            throw "vcpkg short root already exists: $vcpkgRoot"
          }
          New-Item -ItemType Directory -Path $vcpkgRoot | Out-Null
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          Write-Host "Using VCPKG_ROOT=$vcpkgRoot"

      - name: Checkout vcpkg
        run: |
          git clone --no-tags https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          git -C $env:VCPKG_ROOT checkout --detach ${{ steps.vcpkg-baseline.outputs.ref }}

      - name: Bootstrap vcpkg
        run: |
          $bootstrap = Join-Path $env:VCPKG_ROOT "bootstrap-vcpkg.bat"
          & $bootstrap -disableMetrics

      - name: Prepare vcpkg binary cache
        run: New-Item -ItemType Directory -Force vcpkg-cache | Out-Null

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ matrix.triplet }}-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ matrix.triplet }}-

      - name: Build Release
        run: .\scripts\build_windows.ps1 -BuildType Release -Triplet $env:CLIPP_RELEASE_TRIPLET -VcVarsArch ${{ matrix.vcvars_arch }} -Version "${{ inputs.version }}" -DisableCodeSigning

      - name: Verify Windows artifacts
        run: |
          $exe = ".\build\windows-release\clipp.exe"
          $shim = ".\build\windows-release\clipp.com"
          if (-not (Test-Path $exe)) {
            throw "Missing expected executable: $exe"
          }
          if (-not (Test-Path $shim)) {
            throw "Missing expected console shim: $shim"
          }

      - name: Verify static dependency closure
        run: |
          $exe = ".\build\windows-release\clipp.exe"
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -property installationPath
          $vcvars = Join-Path $installPath "VC\Auxiliary\Build\vcvarsall.bat"
          $dump = & cmd.exe /d /s /c "call `"$vcvars`" ${{ matrix.vcvars_arch }} >nul && dumpbin /dependents `"$exe`""
          $dump

          $blocked = $dump | Select-String -Pattern "VCRUNTIME|MSVCP|ucrtbase|libsodium|xxhash|zstd|lodepng" -CaseSensitive:$false
          if ($blocked) {
            throw "Release exe imports non-system runtime/dependency DLLs: $($blocked -join '; ')"
          }

      - name: Azure login (Trusted Signing)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows artifacts
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\build\windows-release
          files-folder-filter: exe,com
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signatures
        run: |
          foreach ($f in @(".\build\windows-release\clipp.exe", ".\build\windows-release\clipp.com")) {
              $sig = Get-AuthenticodeSignature $f
              if ($sig.Status -ne 'Valid') {
                  throw "Signature on $f is not Valid: $($sig.Status) — $($sig.StatusMessage)"
              }
              Write-Host "[+] $f signed by: $($sig.SignerCertificate.Subject)"
          }

      # MSIX runs after the exe/com are signed: the package embeds the signed binaries
      # and the script derives the manifest Publisher from the signed clipp.exe. Pack
      # unsigned here (Windows PowerShell, because the logo downscaling uses
      # System.Drawing), then sign the .msix with the same Trusted Signing account.
      - name: Package MSIX (unsigned)
        shell: powershell
        run: .\scripts\package_windows_msix.ps1 -Arch ${{ matrix.arch }} -Version "${{ inputs.version }}" -NoSign

      - name: Sign MSIX
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\build\msix
          files-folder-filter: msix
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify MSIX signature
        run: |
          $msix = ".\build\msix\clipp-${{ inputs.version }}-${{ matrix.arch }}.msix"
          $sig = Get-AuthenticodeSignature $msix
          if ($sig.Status -ne 'Valid') {
              throw "MSIX signature is not Valid: $($sig.Status) ($($sig.StatusMessage))"
          }
          Write-Host "[+] $msix signed by: $($sig.SignerCertificate.Subject)"

      - name: Package artifacts
        run: |
          $ver = "${{ inputs.version }}"
          $arch = "${{ matrix.arch }}"
          $src = ".\build\windows-release"
          $stage = ".\release-stage"
          New-Item -ItemType Directory -Path $stage | Out-Null

          $binZip = Join-Path $stage "clipp-$ver-windows-$arch.zip"
          Compress-Archive -Path "$src\clipp.exe","$src\clipp.com" -DestinationPath $binZip
          Write-Host "Created $binZip"

          $pdbs = @(Get-ChildItem -Path "$src\*.pdb")
          if ($pdbs.Count -eq 0) {
            throw "No PDBs found in $src — symbol shipment is required."
          }
          $pdbZip = Join-Path $stage "clipp-$ver-windows-$arch-symbols.zip"
          Compress-Archive -Path ($pdbs | ForEach-Object { $_.FullName }) -DestinationPath $pdbZip
          Write-Host "Created $pdbZip with $($pdbs.Count) PDB(s)"

          $msix = ".\build\msix\clipp-$ver-$arch.msix"
          if (-not (Test-Path $msix)) { throw "Signed MSIX not found: $msix" }
          Copy-Item $msix (Join-Path $stage "clipp-$ver-windows-$arch.msix")
          Write-Host "Staged $msix"

          Get-ChildItem $stage | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    # Same release-signing environment as the Windows job — protection rules
    # (if/when added) apply to both platforms uniformly.
    environment: release-signing
    env:
      CLIPP_CACHE_DIR: ${{ github.workspace }}/clipp-cache
      VCPKG_ROOT: ${{ github.workspace }}/v
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
    steps:
      - name: Checkout clipp
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: brew install autoconf autoconf-archive automake libtool ninja

      - name: Read vcpkg baseline
        id: vcpkg-baseline
        run: |
          baseline="$(python3 - <<'PY'
          import json
          with open("src/vcpkg.json", encoding="utf-8") as manifest_file:
              manifest = json.load(manifest_file)
          print(manifest.get("builtin-baseline", ""))
          PY
          )"
          if [[ -z "$baseline" ]]; then
            echo "src/vcpkg.json must define builtin-baseline for CI." >&2
            exit 1
          fi
          echo "ref=$baseline" >> "$GITHUB_OUTPUT"

      - name: Checkout vcpkg
        run: |
          git clone --no-tags https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "${{ steps.vcpkg-baseline.outputs.ref }}"

      - name: Bootstrap vcpkg
        run: |
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-

      # Imports the Developer ID Application cert into a temporary keychain
      # scoped to this job. The action auto-cleans the keychain on job exit
      # via its post-step, so the runner ends up in the same state it started.
      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "${{ runner.temp }}/authkey.p8"
          # Quick sanity-check: notarytool errors are noisy if the key is
          # missing the PEM markers (e.g. someone double-base64'd it).
          if ! grep -q "BEGIN PRIVATE KEY" "${{ runner.temp }}/authkey.p8"; then
            echo "::error::APPLE_API_KEY_P8 secret doesn't look like a PEM .p8 file"
            exit 1
          fi

      - name: Build Release (signed + notarized)
        env:
          APPLE_CODESIGN_IDENTITY: ${{ vars.APPLE_CODESIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/authkey.p8
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
        run: ./scripts/build_macos.sh --version "${{ inputs.version }}" --notarize

      - name: Verify macOS app bundle
        run: |
          echo "::group::Workspace state"
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la build/ 2>&1 || echo "(no build/ directory in $(pwd))"
          echo "::endgroup::"

          # build_macos.sh chooses the output path based on whether xcode-select
          # points at Xcode.app (build/Release/Clipp.app) or the Command Line
          # Tools (build/Clipp.app). GitHub runners default to the CLT.
          # Use the same find pattern as macos-ci.yml — lowercase matches via
          # case-insensitive APFS, no -maxdepth so we never miss it.
          app="$(find build -name 'clipp.app' -type d -print -quit)"
          if [[ -z "$app" || ! -d "$app" ]]; then
            echo "::error::Could not find Clipp.app under build/"
            echo "--- build/ tree (top 100 entries) ---" >&2
            find build -print 2>&1 | head -100 >&2 || true
            exit 1
          fi
          echo "Found app bundle at: $app"
          echo "APP_PATH=$app" >> "$GITHUB_ENV"
          for path in \
            "$app/Contents/MacOS/clipp" \
            "$app/Contents/Resources/Clipp.icns" \
            "$app/Contents/Resources/ClippMenuBarTemplate.png" \
            "$app/Contents/Resources/Clipboard4DevAspect-macos-1024-transparent.png" \
            "$app/Contents/Info.plist"
          do
            if [[ ! -e "$path" ]]; then
              echo "Missing expected bundle path: $path" >&2
              exit 1
            fi
          done
          if [[ ! -x "$app/Contents/MacOS/clipp" ]]; then
            echo "App executable is not executable: $app/Contents/MacOS/clipp" >&2
            exit 1
          fi

      - name: Package artifact
        run: |
          ver="${{ inputs.version }}"
          mkdir -p release-stage
          # ditto (not zip) preserves macOS metadata correctly; --sequesterRsrc keeps
          # the archive shape macOS expects; --keepParent puts Clipp.app at the root.
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "release-stage/clipp-$ver-macos-arm64.zip"
          ls -la release-stage/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Build inside an OLD-glibc base (Debian 11 / glibc 2.31) so the binary runs on
    # anything from ~2021 on (Debian 11+, Ubuntu 20.04+, RHEL 9+, Fedora 33+). The
    # C++20 runtime is statically linked (-static-libstdc++/-static-libgcc, set in
    # CMakeLists), so the only runtime deps are glibc + libavahi-client. Native arm64
    # runner (no QEMU) -- both arches run the identical container.
    container:
      image: debian:11
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    # The scripts and steps below use bash-isms ([[ ]], heredocs). A container job's
    # default shell can be plain sh, so pin bash (present in the debian:11 base).
    defaults:
      run:
        shell: bash
    env:
      CLIPP_CACHE_DIR: ${{ github.workspace }}/clipp-cache
      VCPKG_ROOT: ${{ github.workspace }}/v
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
    steps:
      # debian:11 is bare -- install the toolchain build_linux.sh expects plus the
      # bits vcpkg needs to build libsodium from source, and the Avahi client headers.
      # gettext-base provides envsubst for package_linux.sh's config rendering; rpm and
      # zstd let nfpm emit .rpm / Arch packages; sudo so the scripts' calls are no-ops
      # as root in-container.
      - name: Install toolchain
        run: |
          apt-get update
          # NOTE: NOT installing Debian 11's cmake -- it's 3.18.4 and the project needs
          # >= 3.20. A recent CMake is dropped on PATH in the next step instead.
          apt-get install -y --no-install-recommends \
            build-essential ninja-build pkg-config git curl ca-certificates \
            autoconf autoconf-archive automake libtool \
            libavahi-client-dev \
            gettext-base rpm zstd \
            zip unzip tar

      - name: Install recent CMake
        run: |
          set -euo pipefail
          # Debian 11's cmake (3.18.4) is below our 3.20 floor. Drop an official Kitware
          # release binary on PATH; the tarballs are arch-specific but identical in shape.
          cmake_version=3.30.5
          case "${{ matrix.arch }}" in
            amd64) cmake_arch=x86_64 ;;
            arm64) cmake_arch=aarch64 ;;
            *) echo "Unhandled arch ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          url="https://github.com/Kitware/CMake/releases/download/v${cmake_version}/cmake-${cmake_version}-linux-${cmake_arch}.tar.gz"
          mkdir -p /opt/cmake
          curl -fsSL "$url" | tar -xz --strip-components=1 -C /opt/cmake
          # Prepend to PATH for all later steps (build_linux.sh's preflight + the build).
          echo "/opt/cmake/bin" >> "$GITHUB_PATH"
          /opt/cmake/bin/cmake --version

      - name: Checkout clipp
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read vcpkg baseline
        id: vcpkg-baseline
        run: |
          # Grep the 40-hex baseline straight out of the manifest. (The macOS/Windows
          # jobs use python/PowerShell JSON parsing; the bare debian:11 base has no
          # python3, and a grep is sufficient for a single well-formed field.)
          baseline="$(grep -oE '"builtin-baseline"[[:space:]]*:[[:space:]]*"[0-9a-f]+"' src/vcpkg.json | grep -oE '[0-9a-f]{40}')"
          if [[ -z "$baseline" ]]; then
            echo "src/vcpkg.json must define builtin-baseline for CI." >&2
            exit 1
          fi
          echo "ref=$baseline" >> "$GITHUB_OUTPUT"

      - name: Checkout vcpkg
        run: |
          git clone --no-tags https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "${{ steps.vcpkg-baseline.outputs.ref }}"

      - name: Bootstrap vcpkg
        run: |
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: linux-${{ matrix.arch }}-glibc231-vcpkg-${{ hashFiles('src/vcpkg.json', 'src/vcpkg-triplets/**') }}
          restore-keys: |
            linux-${{ matrix.arch }}-glibc231-vcpkg-

      - name: Build Release
        run: bash ./scripts/build_linux.sh --release --version "${{ inputs.version }}"

      - name: Verify dependency closure
        run: |
          set -euo pipefail
          binary="build/linux-release/clipp"
          if [[ ! -x "$binary" ]]; then
            echo "Missing expected executable: $binary" >&2
            exit 1
          fi
          echo "=== readelf -d NEEDED ==="
          readelf -d "$binary" | grep NEEDED || true
          # Guard the static-runtime invariant: libstdc++/libgcc_s must NOT be dynamic
          # deps, and the vcpkg libs must be absent (statically baked in). If any
          # reappear, the package's declared deps would be wrong.
          needed="$(readelf -d "$binary" | grep NEEDED || true)"
          for forbidden in libstdc++ libgcc_s libsodium libxxhash libzstd libutf8proc; do
            if echo "$needed" | grep -q "$forbidden"; then
              echo "Unexpected dynamic dependency on $forbidden — static-link invariant broken." >&2
              exit 1
            fi
          done
          echo "Static-runtime invariant holds (only avahi + libc are dynamic)."

      - name: Package (deb, rpm, Arch)
        run: |
          set -euo pipefail
          bash ./scripts/package_linux.sh \
            --version "${{ inputs.version }}" \
            --binary build/linux-release/clipp \
            --arch ${{ matrix.arch }} \
            --outdir dist

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          ver="${{ inputs.version }}"
          arch="${{ matrix.arch }}"
          mkdir -p release-stage
          # Rename into the clipp-$ver-linux-$arch.<ext> convention used by the other
          # platforms. nfpm's native names differ per format; normalize for the release.
          deb="$(ls dist/*.deb)"
          rpm="$(ls dist/*.rpm)"
          pkg="$(ls dist/*.pkg.tar.zst)"
          cp "$deb" "release-stage/clipp-$ver-linux-$arch.deb"
          cp "$rpm" "release-stage/clipp-$ver-linux-$arch.rpm"
          cp "$pkg" "release-stage/clipp-$ver-linux-$arch.pkg.tar.zst"
          # Also ship the raw binary for users who just want it on PATH themselves.
          cp build/linux-release/clipp "release-stage/clipp-$ver-linux-$arch"
          ls -la release-stage/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Create release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          ls -la artifacts/
          echo "Total: $(ls artifacts/ | wc -l) files"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'artifacts/*'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
